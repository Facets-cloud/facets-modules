name_length_limit: 20
intent: ingress
flavor: nginx_gateway_fabric_capillary
version: "1.0"
description: NGINX Gateway Fabric for Capillary Cloud migration - Gateway API with NLB, Proxy Protocol v2, ACM support, SnippetsPolicy/Filter, equivalent_prefixes, and NGINX-specific features
clouds:
  - aws
  - kubernetes
inputs:
  kubernetes_details:
    type: "@outputs/kubernetes"
    optional: false
    default:
      resource_type: kubernetes_cluster
      resource_name: default
    providers:
      - kubernetes
      - kubernetes-alpha
      - helm
  gateway_api_crd_details:
    type: "@outputs/gateway_api_crd"
    optional: false
    default:
      resource_type: gateway_api_crd
      resource_name: default
  prometheus_details:
    type: "@outputs/prometheus"
    optional: true
    default:
      resource_type: configuration
      resource_name: prometheus
  ack_acm_controller_details:
    type: "@outputs/ack_acm_controller"
    optional: true
outputs:
  default:
    type: "@outputs/ingress"
spec:
  title: NGINX Gateway Fabric (Capillary)
  type: object
  properties:
    private:
      type: boolean
      title: Private Load Balancer
      description: Set load balancer as private/internal
    disable_base_domain:
      type: boolean
      title: Disable Base Domain
      description: Disable automatic creation of base domain for this gateway
      default: false
    domains:
      title: Domains
      description: Map of domain key to rules
      type: object
      x-ui-overrides-only: true
      patternProperties:
        ^[a-zA-Z0-9_.-]*$:
          title: Domain Object
          description: Name of the domain object
          type: object
          properties:
            domain:
              type: string
              title: Domain
              description: Host name of the domain
              pattern: ^[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.[A-Za-z]{2,6}$
              x-ui-unique: true
              x-ui-placeholder: "Domain to map ingress. Eg: example.com, sub.example.com, my-domain.co.uk"
              x-ui-error-message: "Value doesn't match the format. Eg: example.com, my-domain.co.uk"
            alias:
              type: string
              title: Alias
              description: Alias for the domain
            certificate_reference:
              type: string
              title: Certificate Reference
              description: Name of an existing TLS secret or ACM ARN (arn:aws:acm:...) to use instead of cert-manager managed certificates
              x-ui-toggle: true
            equivalent_prefixes:
              type: array
              title: Equivalent Prefixes
              description: List of domain_prefix values that should route to this domain. Rules with a matching domain_prefix will be served on this domain's hostname directly (the prefix is a grouping key, not a subdomain).
              items:
                type: string
              x-ui-toggle: true
          required:
            - domain
            - alias
    data_plane:
      type: object
      title: Data Plane (NGINX)
      description: Configuration for NGINX pods that handle actual traffic
      properties:
        scaling:
          type: object
          title: Autoscaling
          description: Horizontal Pod Autoscaler configuration
          properties:
            min_replicas:
              type: integer
              title: Minimum Replicas
              description: Minimum number of NGINX pods (HPA lower bound)
              default: 2
            max_replicas:
              type: integer
              title: Maximum Replicas
              description: Maximum number of NGINX pods (HPA upper bound)
              default: 10
            target_cpu_utilization_percentage:
              type: integer
              title: Target CPU Utilization (%)
              description: Target CPU utilization percentage for HPA scaling
              default: 70
            target_memory_utilization_percentage:
              type: integer
              title: Target Memory Utilization (%)
              description: Target memory utilization percentage for HPA scaling
              default: 80
        resources:
          type: object
          title: Resources
          description: CPU and memory resources per NGINX pod
          properties:
            requests:
              type: object
              title: Resource Requests
              description: Minimum resource requirements
              properties:
                cpu:
                  type: string
                  title: CPU Request
                  description: Minimum CPU requirement (e.g., 250m, 500m, 1)
                  pattern: ^([0-9]*\.?[0-9]+m?|[0-9]+)$
                  default: 250m
                  x-ui-placeholder: 250m
                memory:
                  type: string
                  title: Memory Request
                  description: Minimum memory requirement (e.g., 256Mi, 512Mi, 1Gi)
                  pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$
                  default: 256Mi
                  x-ui-placeholder: 256Mi
            limits:
              type: object
              title: Resource Limits
              description: Maximum resource limits
              properties:
                cpu:
                  type: string
                  title: CPU Limit
                  description: Maximum CPU allowed (e.g., 1, 2, 500m)
                  pattern: ^([0-9]*\.?[0-9]+m?|[0-9]+)$
                  default: "1"
                  x-ui-placeholder: "1"
                memory:
                  type: string
                  title: Memory Limit
                  description: Maximum memory allowed (e.g., 512Mi, 1Gi, 2Gi)
                  pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$
                  default: 512Mi
                  x-ui-placeholder: 512Mi
    control_plane:
      type: object
      title: Control Plane (Gateway Controller)
      description: Configuration for the NGINX Gateway Fabric controller that manages configuration
      x-ui-toggle: true
      properties:
        scaling:
          type: object
          title: Autoscaling
          description: Horizontal Pod Autoscaler configuration
          properties:
            min_replicas:
              type: integer
              title: Minimum Replicas
              description: Minimum number of controller pods (HPA lower bound)
              default: 2
            max_replicas:
              type: integer
              title: Maximum Replicas
              description: Maximum number of controller pods (HPA upper bound)
              default: 3
            target_cpu_utilization_percentage:
              type: integer
              title: Target CPU Utilization (%)
              description: Target CPU utilization percentage for HPA scaling
              default: 70
            target_memory_utilization_percentage:
              type: integer
              title: Target Memory Utilization (%)
              description: Target memory utilization percentage for HPA scaling
              default: 80
        resources:
          type: object
          title: Resources
          description: CPU and memory resources per controller pod
          properties:
            requests:
              type: object
              title: Resource Requests
              description: Minimum resource requirements
              properties:
                cpu:
                  type: string
                  title: CPU Request
                  description: Minimum CPU requirement (e.g., 100m, 250m, 500m)
                  pattern: ^([0-9]*\.?[0-9]+m?|[0-9]+)$
                  default: 200m
                  x-ui-placeholder: 200m
                memory:
                  type: string
                  title: Memory Request
                  description: Minimum memory requirement (e.g., 256Mi, 512Mi)
                  pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$
                  default: 256Mi
                  x-ui-placeholder: 256Mi
            limits:
              type: object
              title: Resource Limits
              description: Maximum resource limits
              properties:
                cpu:
                  type: string
                  title: CPU Limit
                  description: Maximum CPU allowed (e.g., 500m, 1, 2)
                  pattern: ^([0-9]*\.?[0-9]+m?|[0-9]+)$
                  default: 500m
                  x-ui-placeholder: 500m
                memory:
                  type: string
                  title: Memory Limit
                  description: Maximum memory allowed (e.g., 512Mi, 1Gi)
                  pattern: ^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$
                  default: 512Mi
                  x-ui-placeholder: 512Mi
    rules:
      title: Routing Rules
      description: Gateway API routing configurations (HTTP and gRPC)
      type: object
      patternProperties:
        ^[a-zA-Z0-9_.-]*$:
          title: Route Object
          description: HTTP route configuration
          type: object
          properties:
            disable:
              type: boolean
              title: Disable Route
              description: Enable/Disable this route
            domain_prefix:
              type: string
              title: Domain Prefix
              description: Subdomain prefix
              pattern: ^[a-z0-9]([a-z0-9-]{0,34}[a-z0-9])?$|^[a-z0-9]$
              x-ui-placeholder: Enter the subdomain prefix
              x-ui-error-message: Max 36 characters, only hyphens allowed, cannot start/end with hyphen
            service_name:
              type: string
              title: Service Name
              description: Kubernetes service name
              x-ui-api-source:
                endpoint: /cc-ui/v1/dropdown/stack/{{stackName}}/resources-info
                method: GET
                params:
                  includeContent: false
                labelKey: resourceName
                valueKey: resourceName
                valueTemplate: ${service.{{value}}.out.attributes.service_name}
                filterConditions:
                  - field: resourceType
                    value: service
              x-ui-typeable: true
            namespace:
              type: string
              title: Service Namespace
              description: Kubernetes service namespace
              x-ui-api-source:
                endpoint: /cc-ui/v1/dropdown/stack/{{stackName}}/resources-info
                method: GET
                params:
                  includeContent: false
                labelKey: resourceName
                valueKey: resourceName
                valueTemplate: ${service.{{value}}.out.attributes.namespace}
                filterConditions:
                  - field: resourceType
                    value: service
              x-ui-typeable: true
            port:
              type: string
              title: Port
              description: Service port number
              x-ui-api-source:
                endpoint: /cc-ui/v1/dropdown/stack/{{stackName}}/service/{{serviceName}}/overview
                dynamicProperties:
                  serviceName:
                    key: service_name
                    lookup: regex
                    x-ui-lookup-regex: \${[^.]+\.([^.]+).*
                method: GET
                labelKey: port
                valueKey: port
                path: ports
              x-ui-typeable: true
            path:
              type: string
              title: Path
              description: Path of the application (required for HTTP routes)
              pattern: ^(/[^\s{};^]*)$
              x-ui-placeholder: "Enter path (e.g., / or /api or /api/v[0-9]+)"
              x-ui-error-message: "Path must start with /"
              x-ui-visible-if:
                field: spec.rules.{{this}}.grpc_config.enabled
                values:
                  - false
                  - null
            disable_auth:
              type: boolean
              title: Disable Auth for this Route
              description: Disable basic authentication for this specific route (only relevant when basic_auth is enabled)
              default: false
              x-ui-visible-if:
                field: spec.basic_auth
                values:
                  - true
            path_type:
              type: string
              title: Path Type
              description: "Path matching type. RegularExpression (default) matches paths using regex for ingress-nginx parity. Use PathPrefix for prefix matching or Exact for exact path matching."
              enum:
                - RegularExpression
                - PathPrefix
                - Exact
              default: RegularExpression
              x-ui-visible-if:
                field: spec.rules.{{this}}.grpc_config.enabled
                values:
                  - false
                  - null
            header_matches:
              type: object
              title: Header-Based Routing
              description: Route traffic based on HTTP headers
              x-ui-toggle: true
              patternProperties:
                ^[a-zA-Z0-9_.-]*$:
                  type: object
                  title: Header Match
                  properties:
                    name:
                      type: string
                      title: Header Name
                      description: HTTP header name to match
                      x-ui-placeholder: X-API-Version
                    value:
                      type: string
                      title: Header Value
                      description: Header value to match
                      x-ui-placeholder: v2
                    type:
                      type: string
                      title: Match Type
                      description: How to match the header value (Exact or RegularExpression)
                      enum:
                        - Exact
                        - RegularExpression
                      default: Exact
                  required:
                    - name
                    - value
            query_param_matches:
              type: object
              title: Query Parameter Matching
              description: Route traffic based on query parameters
              x-ui-toggle: true
              patternProperties:
                ^[a-zA-Z0-9_.-]*$:
                  type: object
                  title: Query Param Match
                  properties:
                    name:
                      type: string
                      title: Parameter Name
                      description: Query parameter name to match
                      x-ui-placeholder: version
                    value:
                      type: string
                      title: Parameter Value
                      description: Query parameter value to match
                      x-ui-placeholder: beta
                    type:
                      type: string
                      title: Match Type
                      description: How to match the parameter value (Exact or RegularExpression)
                      enum:
                        - Exact
                        - RegularExpression
                      default: Exact
                  required:
                    - name
                    - value
            method:
              type: string
              title: HTTP Method
              description: Match requests by HTTP method
              enum:
                - ALL
                - GET
                - POST
                - PUT
                - DELETE
                - PATCH
                - HEAD
                - OPTIONS
              default: ALL
              x-ui-toggle: true
            request_header_modifier:
              type: object
              title: Request Header Modification
              description: Modify request headers
              x-ui-toggle: true
              properties:
                add:
                  type: object
                  title: Add Headers
                  description: Headers to add to requests
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        name:
                          type: string
                          title: Header Name
                          description: Name of the header to add
                          x-ui-placeholder: X-Custom-Header
                        value:
                          type: string
                          title: Header Value
                          description: Value for the header
                          x-ui-placeholder: custom-value
                      required:
                        - name
                        - value
                set:
                  type: object
                  title: Set Headers
                  description: Headers to set (override) in requests
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        name:
                          type: string
                          title: Header Name
                          description: Name of the header to set
                          x-ui-placeholder: X-Request-Source
                        value:
                          type: string
                          title: Header Value
                          description: Value for the header
                          x-ui-placeholder: gateway
                      required:
                        - name
                        - value
                remove:
                  type: object
                  title: Remove Headers
                  description: Header names to remove from requests
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        name:
                          type: string
                          title: Header Name
                          description: Name of the header to remove
                          x-ui-placeholder: X-Sensitive-Header
                      required:
                        - name
            response_header_modifier:
              type: object
              title: Response Header Modification
              description: Modify response headers
              x-ui-toggle: true
              properties:
                add:
                  type: object
                  title: Add Headers
                  description: Headers to add to responses
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        name:
                          type: string
                          title: Header Name
                          description: Name of the header to add
                          x-ui-placeholder: X-Response-ID
                        value:
                          type: string
                          title: Header Value
                          description: Value for the header
                          x-ui-placeholder: unique-id
                      required:
                        - name
                        - value
                set:
                  type: object
                  title: Set Headers
                  description: Headers to set (override) in responses
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        name:
                          type: string
                          title: Header Name
                          description: Name of the header to set
                          x-ui-placeholder: Cache-Control
                        value:
                          type: string
                          title: Header Value
                          description: Value for the header
                          x-ui-placeholder: no-store
                      required:
                        - name
                        - value
                remove:
                  type: object
                  title: Remove Headers
                  description: Header names to remove from responses
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        name:
                          type: string
                          title: Header Name
                          description: Name of the header to remove
                          x-ui-placeholder: Server
                      required:
                        - name
            url_rewrite:
              type: object
              title: URL Rewriting
              description: Rewrite request URLs
              x-ui-toggle: true
              patternProperties:
                ^[a-zA-Z0-9_.-]*$:
                  type: object
                  title: URL Rewrite Rule
                  properties:
                    hostname:
                      type: string
                      title: Hostname
                      description: New hostname for the request
                      x-ui-placeholder: internal-api.svc.cluster.local
                    path_type:
                      type: string
                      title: Path Rewrite Type
                      description: How to rewrite the path (ReplaceFullPath or ReplacePrefixMatch)
                      enum:
                        - ReplaceFullPath
                        - ReplacePrefixMatch
                    replace_path:
                      type: string
                      title: Replace Path Value
                      description: New path value (full path or prefix depending on type)
                      x-ui-placeholder: /v2/api
            canary_deployment:
              type: object
              title: Canary Deployment
              description: Configure traffic splitting for canary deployments
              x-ui-toggle: true
              x-ui-skip: true
              properties:
                enabled:
                  type: boolean
                  title: Enable Canary
                  description: Enable canary deployment with traffic splitting
                  default: false
                canary_service:
                  type: string
                  title: Canary Service Name
                  description: Name of the canary version service
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.canary_deployment.enabled
                    values:
                      - true
                canary_weight:
                  type: integer
                  title: Canary Traffic Percentage
                  description: Percentage of traffic to send to canary (0-100)
                  minimum: 0
                  maximum: 100
                  default: 10
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.canary_deployment.enabled
                    values:
                      - true
            request_mirror:
              type: object
              title: Request Mirroring
              description: Mirror traffic to a secondary backend for testing
              x-ui-toggle: true
              x-ui-skip: true
              properties:
                service_name:
                  type: string
                  title: Mirror Service Name
                  description: Name of the service to mirror traffic to
                port:
                  type: string
                  title: Mirror Service Port
                  description: Port of the mirror service
                namespace:
                  type: string
                  title: Mirror Service Namespace
                  description: Namespace of the mirror service
            timeouts:
              type: object
              title: Request Timeouts
              description: Configure request and backend timeouts
              x-ui-toggle: true
              properties:
                request:
                  type: string
                  title: Request Timeout
                  description: Total request timeout (e.g., 30s, 1m, 5m)
                  pattern: ^\d+[smh]$
                  default: 300s
                  x-ui-placeholder: "300s"
                backend_request:
                  type: string
                  title: Backend Request Timeout
                  description: Backend response timeout (e.g., 30s, 1m, 5m)
                  default: 300s
                  pattern: ^\d+[smh]$
                  x-ui-placeholder: "300s"
            cors:
              type: object
              title: CORS Configuration
              description: Configure Cross-Origin Resource Sharing
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable CORS
                  description: Enable Cross-Origin Resource Sharing headers
                  default: false
                allow_origins:
                  type: object
                  title: Allowed Origins
                  description: List of allowed origins (* for all)
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                      - true
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Origin
                      properties:
                        origin:
                          type: string
                          title: Origin URL
                          description: Allowed origin URL
                          x-ui-placeholder: https://example.com
                      required:
                        - origin
                allow_methods:
                  type: object
                  title: Allowed Methods
                  description: HTTP methods allowed for CORS requests
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                      - true
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Method
                      properties:
                        method:
                          type: string
                          title: HTTP Method
                          description: HTTP method to allow
                          enum:
                            - GET
                            - POST
                            - PUT
                            - DELETE
                            - PATCH
                            - OPTIONS
                            - HEAD
                      required:
                        - method
                allow_headers:
                  type: object
                  title: Allowed Headers
                  description: HTTP headers allowed in CORS requests
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                      - true
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        header:
                          type: string
                          title: Header Name
                          description: Header name to allow
                          x-ui-placeholder: Content-Type
                      required:
                        - header
                expose_headers:
                  type: object
                  title: Exposed Headers
                  description: Response headers the browser should expose to JavaScript (Access-Control-Expose-Headers)
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                      - true
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Header
                      properties:
                        header:
                          type: string
                          title: Header Name
                          description: Response header name to expose
                          x-ui-placeholder: X-Request-ID
                      required:
                        - header
                allow_credentials:
                  type: boolean
                  title: Allow Credentials
                  description: Allow cookies and authentication headers in CORS requests
                  default: false
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                      - true
                max_age:
                  type: integer
                  title: Preflight Cache Max Age
                  description: Seconds to cache preflight response
                  default: 86400
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.cors.enabled
                    values:
                      - true
            grpc_config:
              type: object
              title: gRPC Configuration
              description: Configure gRPC routing
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable gRPC
                  description: Enable gRPC routing for this service
                  default: false
                match_all_methods:
                  type: boolean
                  title: Match All Methods
                  description: Route all gRPC traffic (no method filtering)
                  default: true
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.grpc_config.enabled
                    values:
                      - true
                method_match:
                  type: object
                  title: gRPC Method Matching
                  description: Whitelist specific gRPC services/methods
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.grpc_config.match_all_methods
                    values:
                      - false
                  patternProperties:
                    ^[a-zA-Z0-9_.-]*$:
                      type: object
                      title: Method Match
                      properties:
                        service:
                          type: string
                          title: Service Name
                          description: Protobuf service name (e.g., helloworld.Greeter)
                        method:
                          type: string
                          title: Method Name
                          description: gRPC method name (e.g., SayHello)
                        type:
                          type: string
                          title: Match Type
                          description: NGINX Gateway Fabric only supports Exact matching
                          enum:
                            - Exact
                          default: Exact
                      required:
                        - service
                        - method
            nginx_timeouts:
              type: object
              title: NGINX Proxy Timeouts
              description: NGINX-specific proxy timeouts (proxy_connect/read/send_timeout) via SnippetsFilter
              x-ui-toggle: true
              properties:
                proxy_connect_timeout:
                  type: string
                  title: Proxy Connect Timeout
                  description: "Timeout for establishing connection to backend (e.g., 60s, 600s)"
                  pattern: ^\d+[smh]?$
                  default: "300s"
                  x-ui-placeholder: "300s"
                proxy_read_timeout:
                  type: string
                  title: Proxy Read Timeout
                  description: "Timeout for reading response from backend (e.g., 300s, 600s)"
                  pattern: ^\d+[smh]?$
                  default: "300s"
                  x-ui-placeholder: "300s"
                proxy_send_timeout:
                  type: string
                  title: Proxy Send Timeout
                  description: "Timeout for sending request to backend (e.g., 300s, 600s)"
                  pattern: ^\d+[smh]?$
                  default: "300s"
                  x-ui-placeholder: "300s"
            configuration_snippet:
              type: string
              title: Configuration Snippet
              description: "Custom NGINX location-level configuration snippet (injected via SnippetsFilter)"
              x-ui-toggle: true
              x-ui-yaml-editor: true
            server_snippet:
              type: string
              title: Server Snippet
              description: "Custom NGINX server-level configuration snippet (injected via SnippetsFilter)"
              x-ui-toggle: true
              x-ui-yaml-editor: true
            backend_tls:
              type: object
              title: Backend TLS Policy
              description: "Configure TLS for connecting to the backend service. Creates a BackendTLSPolicy resource. Use when the backend serves HTTPS with a self-signed certificate issued via cert-manager."
              x-ui-toggle: true
              properties:
                enabled:
                  type: boolean
                  title: Enable Backend TLS
                  description: "Enable BackendTLSPolicy for this backend service"
                  default: false
                ca_certificate_secret:
                  type: string
                  title: CA Certificate Secret
                  description: "Name of the Kubernetes Secret containing the CA certificate (ca.crt key) that signed the backend's TLS certificate"
                  x-ui-placeholder: "my-backend-ca-cert"
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.backend_tls.enabled
                    values:
                      - true
                hostname:
                  type: string
                  title: Backend TLS Hostname
                  description: "Expected server name in the backend's TLS certificate (must match CN or SAN). Defaults to the rule's service_name if not set."
                  x-ui-placeholder: "my-service"
                  x-ui-visible-if:
                    field: spec.rules.{{this}}.backend_tls.enabled
                    values:
                      - true
          required:
            - service_name
            - port
            - namespace
          x-ui-order:
            - disable
            - disable_auth
            - domain_prefix
            - service_name
            - namespace
            - port
            - path
            - path_type
            - method
            - timeouts
            - nginx_timeouts
            - cors
            - header_matches
            - query_param_matches
            - url_rewrite
            - request_header_modifier
            - response_header_modifier
            - configuration_snippet
            - server_snippet
            - backend_tls
            - grpc_config
    # Disabling below things as too advanced for initial release
    # - canary_deployment
    # - request_mirror
    force_ssl_redirection:
      type: boolean
      title: Force SSL Redirection
      description: Force HTTP to HTTPS redirection
    basic_auth:
      type: boolean
      title: Basic Authentication
      description: Enable/disable basic auth for all routes (individual routes can opt out with disable_auth)
      default: false
    body_size:
      type: string
      title: Max Body Size
      description: Maximum allowed size of the client request body (e.g., 150m, 1g)
      pattern: ^\d{1,4}(k|m|g)?$
      default: 150m
      x-ui-placeholder: 150m
      x-ui-toggle: true
    helm_values:
      type: object
      title: Additional Helm Values
      description: "Additional Helm values to merge with the default configuration. See available values at: https://github.com/nginxinc/nginx-gateway-fabric/blob/main/charts/nginx-gateway-fabric/values.yaml"
      x-ui-toggle: true
      x-ui-yaml-editor: true
    domain_prefix_override:
      type: string
      title: Domain Prefix Override
      description: Override the automatically generated domain prefix
      x-ui-toggle: true
    disable_endpoint_validation:
      type: boolean
      title: Disable Endpoint Validation
      description: Disable endpoint validation for cert-manager (uses DNS validation instead of HTTP)
      default: false
      x-ui-toggle: true
    use_dns01:
      type: boolean
      title: Use DNS-01 Resolver
      description: Use DNS-01 challenge type for certificate issuance. When enabled, all domain listeners use wildcard hostnames (*.domain) and certificates are issued via the DNS-01 ClusterIssuer.
      default: false
      x-ui-toggle: true
    dns01_cluster_issuer:
      type: string
      title: DNS-01 ClusterIssuer
      description: Name of the ClusterIssuer to use for DNS-01 certificate issuance
      default: gts-production
      x-ui-toggle: true
      x-ui-visible-if:
        field: spec.use_dns01
        values:
          - true
    helm_wait:
      type: boolean
      title: Helm Wait
      description: Wait for all resources to be ready before marking the release as successful
      default: true
      x-ui-toggle: true
    custom_log_format:
      type: string
      title: Custom Log Format
      description: "Custom NGINX log format string. Injected via SnippetsPolicy in http context."
      x-ui-toggle: true
      x-ui-yaml-editor: true
    log_format_escape:
      type: string
      title: Log Format Escape
      description: "Escape mode for custom log format (json, none, default)"
      enum:
        - json
        - none
        - default
      default: "default"
      x-ui-toggle: true
      x-ui-visible-if:
        field: spec.custom_log_format
        values:
          - true
    underscores_in_headers:
      type: boolean
      title: Underscores in Headers
      description: "Allow underscores in HTTP header names (underscores_in_headers on)"
      default: false
      x-ui-toggle: true
    ip_access_control:
      type: object
      title: IP Access Control
      description: "Gateway-wide IP deny/allow rules via SnippetsPolicy"
      x-ui-toggle: true
      properties:
        deny:
          type: array
          title: Deny CIDRs
          description: "IP addresses/CIDRs to deny (e.g., 101.0.63.85/32)"
          items:
            type: string
        allow:
          type: array
          title: Allow CIDRs
          description: "IP addresses/CIDRs to allow (e.g., all)"
          items:
            type: string
    proxy_buffer_size:
      type: string
      title: Proxy Buffer Size
      description: "NGINX proxy_buffer_size directive (e.g., 8k, 16k, 32k)"
      pattern: ^\d+[kKmM]?$
      x-ui-toggle: true
      x-ui-placeholder: "8k"
    proxy_buffers_number:
      type: integer
      title: Proxy Buffers Number
      description: "Number of NGINX proxy_buffers"
      x-ui-toggle: true
    proxy_set_headers:
      type: object
      title: Proxy Set Headers
      description: "Gateway-level proxy_set_header directives. Map of header name to value. Supports NGINX variables (e.g., $request_id)."
      x-ui-toggle: true
      x-ui-yaml-editor: true
      patternProperties:
        ^[a-zA-Z0-9_.-]*$:
          type: string
    dns_override:
      type: object
      title: DNS Override
      description: "Override DNS record creation. Use to point to a shared LB or skip Route53."
      x-ui-toggle: true
      properties:
        record_type:
          type: string
          title: Record Type
          enum:
            - CNAME
            - A
        record_value:
          type: string
          title: Record Value
          description: "Custom DNS record value (hostname or IP)"
  required:
    - private
    - rules
    - force_ssl_redirection
  x-ui-order:
    - private
    - domain_prefix_override
    - disable_base_domain
    - domains
    - force_ssl_redirection
    - basic_auth
    - body_size
    - underscores_in_headers
    - custom_log_format
    - log_format_escape
    - proxy_set_headers
    - ip_access_control
    - proxy_buffer_size
    - proxy_buffers_number
    - disable_endpoint_validation
    - use_dns01
    - dns01_cluster_issuer
    - dns_override
    - data_plane
    - control_plane
    - helm_values
    - helm_wait
    - rules
sample:
  kind: ingress
  flavor: nginx_gateway_fabric_capillary
  version: "1.0"
  disabled: true
  metadata:
    annotations: {}
  spec:
    private: false
    disable_base_domain: false
    force_ssl_redirection: true
    basic_auth: false
    body_size: 150m
    data_plane:
      scaling:
        min_replicas: 2
        max_replicas: 5
        target_cpu_utilization_percentage: 70
        target_memory_utilization_percentage: 80
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
    control_plane:
      scaling:
        min_replicas: 2
        max_replicas: 3
        target_cpu_utilization_percentage: 70
        target_memory_utilization_percentage: 80
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    rules: {}
